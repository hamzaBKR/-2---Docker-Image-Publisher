name: CI

on:
  push:
    branches: [master]
  pull_request:
    branches: [master]

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  ci:
    name: Test on Node ${{ matrix.node }}

    if: |
      github.actor != 'dependabot' &&
      !contains(github.event.head_commit.message, '[skip ci]')

    runs-on: ubuntu-latest

    strategy:
      fail-fast: false
      matrix:
        node: [18, 20]

    outputs:
      image_tag: ${{ steps.set_tag.outputs.image_tag }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Cache dependencies
        uses: actions/cache@v4
        with:
          path: ~/.npm
          key: ${{ runner.os }}-node-${{ matrix.node }}-${{ hashFiles('**/package-lock.json') }}
          restore-keys: |
            ${{ runner.os }}-node-${{ matrix.node }}-
            ${{ runner.os }}-node-

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: ${{ matrix.node }}

      - name: Install dependencies
        run: npm ci

      - name: Lint
        run: npm run lint
        continue-on-error: true

      - name: Run tests
        run: npm test

      - name: Set image tag
        id: set_tag
        run: echo "image_tag=ci-${{ github.sha }}" >> $GITHUB_OUTPUT

      - name: Save logs on failure
        if: failure()
        run: |
          mkdir -p logs
          echo "CI failed on Node ${{ matrix.node }} at $(date)" > logs/error.log
          echo "Commit: ${{ github.sha }}" >> logs/error.log
          echo "Actor: ${{ github.actor }}" >> logs/error.log

      - name: Upload logs if failed
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: logs-node-${{ matrix.node }}
          path: logs/
