name: Publish Docker Image

on:
  push:
    tags:
      - v*

jobs:
  # ── 1. run tests first before publishing ──────────────────────────
  test:
    name: Run tests before publish
    runs-on: ubuntu-latest
    if: startsWith(github.ref, 'refs/tags/')

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Cache dependencies
        uses: actions/cache@v4
        with:
          path: ~/.npm
          key: ${{ runner.os }}-node-18-${{ hashFiles('**/package-lock.json') }}
          restore-keys: |
            ${{ runner.os }}-node-18-
            ${{ runner.os }}-node-

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 18

      - name: Install dependencies
        run: npm ci

      - name: Run tests
        run: npm test

  # ── 2. build and push only after tests pass ────────────────────────
  publish:
    name: Build & Push to Docker Hub
    runs-on: ubuntu-latest
    needs: test

    outputs:
      image_name: ${{ steps.set_output.outputs.image_name }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Extract tag from ref
        id: get_tag
        run: echo "tag=${GITHUB_REF#refs/tags/}" >> $GITHUB_OUTPUT

      - name: Login to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKER_USERNAME }}
          password: ${{ secrets.DOCKER_PASSWORD }}

      - name: Build and push Docker image
        id: docker_build
        uses: ./.github/actions/docker-build
        with:
          image_name: ${{ secrets.DOCKER_USERNAME }}/dockerapp
          tag: ${{ steps.get_tag.outputs.tag }}
          dockerfile_path: ./Dockerfile

      - name: Set image output
        id: set_output
        run: echo "image_name=${{ steps.docker_build.outputs.full_image_name }}" >> $GITHUB_OUTPUT

      - name: Summary
        run: |
          echo "✅ Docker image published successfully!"
          echo "Image: ${{ steps.docker_build.outputs.full_image_name }}"
          echo "Tag: ${{ steps.get_tag.outputs.tag }}"